# =========================
# Server Configuration
# =========================
server.port=8080

# =========================
# PostgreSQL Database Configuration
# Spring Boot automatically reads SPRING_DATASOURCE_* env vars.
# Set these environment variables before starting, or edit the values below.
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hospital123}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# Connection Pool (HikariCP)
# =========================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# =========================
# JPA / Hibernate Configuration
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# JWT Configuration
# =========================
app.jwt.secret=v9T2zL8xQ5nR7sW4yE1uF0aB6cK+ZgJhN3pI/VvD8mY=
app.jwt.expiration-ms=86400000

# =========================
# Mail Configuration
# Disabled by default. Set spring.mail.enabled=true and configure below
# to enable email notifications.
# =========================
# =========================
# Mail Configuration
# Disabled - EmailService is a no-op stub. 
# Re-enable and configure MAIL_HOST/MAIL_USERNAME/MAIL_PASSWORD to send real emails.
# =========================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB